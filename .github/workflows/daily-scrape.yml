name: Daily Job Scrape

on:
  schedule:
    # Runs at 7:00 AM UTC every day
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Allows you to manually trigger from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify secrets are set
        run: |
          if [ -z "$APIFY_API_KEY" ]; then echo "ERROR: APIFY_API_KEY secret not set" && exit 1; fi
          if [ -z "$SUPABASE_URL" ]; then echo "ERROR: SUPABASE_URL secret not set" && exit 1; fi
          if [ -z "$SUPABASE_KEY" ]; then echo "ERROR: SUPABASE_KEY secret not set" && exit 1; fi
          echo "All secrets are configured."
        env:
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Run scraper pipeline
        env:
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -c "from src.main import run_pipeline; run_pipeline()"
