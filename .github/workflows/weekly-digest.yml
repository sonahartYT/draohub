name: Weekly Digest Email

on:
  schedule:
    # Every Monday at 8:00 AM UTC (9:00 AM WAT) — after the daily scrape
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build emails but do not send)'
        type: boolean
        default: false
      preview:
        description: 'Write preview HTMLs as artifacts only'
        type: boolean
        default: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify secrets
        run: |
          if [ -z "$SUPABASE_URL" ];      then echo "ERROR: SUPABASE_URL not set"      && exit 1; fi
          if [ -z "$SUPABASE_KEY" ];      then echo "ERROR: SUPABASE_KEY not set"      && exit 1; fi
          if [ -z "$RESEND_API_KEY" ];    then echo "ERROR: RESEND_API_KEY not set"    && exit 1; fi
          if [ -z "$ANTHROPIC_API_KEY" ]; then echo "ERROR: ANTHROPIC_API_KEY not set" && exit 1; fi
          echo "All secrets configured."
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Send weekly digest
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY:      ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_FROM_EMAIL:   ${{ secrets.DIGEST_FROM_EMAIL }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ];  then FLAGS="--dry-run"; fi
          if [ "${{ github.event.inputs.preview }}" = "true" ]; then FLAGS="--preview"; fi
          python scripts/send_digest.py $FLAGS

      - name: Upload previews as artifacts
        if: ${{ github.event.inputs.preview == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-previews-${{ github.run_id }}
          path: |
            scripts/digest_preview_generic.html
            scripts/digest_preview_personalised.html
          retention-days: 7
