<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — DracoHub Careers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        .login-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px 80px; }
        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-secondary, var(--bg-alt));
            border: 1px solid var(--border);
            border-radius: var(--radius-lg, 16px);
            padding: 40px;
        }
        .login-logo { font-family: var(--font-primary); font-size: 1.4rem; font-weight: 700; margin-bottom: 28px; display: block; color: var(--text); }
        .login-logo span { color: var(--accent); }
        .login-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; gap: 0; }
        .login-tab {
            flex: 1;
            padding: 10px 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            font-family: var(--font-body);
            margin-bottom: -1px;
        }
        .login-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .login-form { display: none; }
        .login-form.active { display: block; }
        .login-field { margin-bottom: 16px; }
        .login-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .login-input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm, 8px);
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font-body);
            transition: border-color 0.2s;
        }
        .login-input:focus { outline: none; border-color: var(--accent); }
        .login-submit {
            width: 100%;
            padding: 13px;
            font-size: 0.95rem;
            font-weight: 700;
            margin-top: 8px;
        }
        .login-forgot { font-size: 0.82rem; color: var(--text-muted); text-align: right; display: block; margin-top: -8px; margin-bottom: 16px; cursor: pointer; }
        .login-forgot:hover { color: var(--accent); }
        .login-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius-sm, 8px);
            padding: 12px 16px;
            color: #ef4444;
            font-size: 0.88rem;
            margin-top: 14px;
            display: none;
        }
        .login-success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: var(--radius-sm, 8px);
            padding: 12px 16px;
            color: var(--text);
            font-size: 0.88rem;
            margin-top: 14px;
            display: none;
        }
        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm, 8px);
            background: var(--bg);
            color: var(--text);
            font-size: 0.92rem;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            margin-bottom: 4px;
        }
        .btn-google:hover { background: var(--bg-alt); border-color: var(--accent); }
        .login-divider { display: flex; align-items: center; gap: 12px; margin: 18px 0 20px; color: var(--text-muted); font-size: 0.8rem; }
        .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .login-pw-wrap { position: relative; }
        .login-pw-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;
        }
        .login-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 5px; }
        .login-spinner { display: none; }
        .login-btn-text { display: inline; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Draco<span class="dot">Hub</span>.</a>
            <div class="nav-actions">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="login-main">
        <div class="login-card">
            <a href="index.html" class="login-logo">Draco<span>Hub</span>.</a>

            <!-- Tabs -->
            <div class="login-tabs">
                <button class="login-tab active" id="tabSignIn">Sign In</button>
                <button class="login-tab" id="tabSignUp">Create Account</button>
            </div>

            <!-- Google OAuth -->
            <button class="btn-google" id="btnGoogle" type="button">
                <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
                Continue with Google
            </button>

            <div class="login-divider"><span>or continue with email</span></div>

            <!-- Sign In Form -->
            <div class="login-form active" id="formSignIn">
                <div class="login-field">
                    <label class="login-label" for="siEmail">Email Address</label>
                    <input type="email" id="siEmail" class="login-input" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="login-field">
                    <label class="login-label" for="siPassword">Password</label>
                    <div class="login-pw-wrap">
                        <input type="password" id="siPassword" class="login-input" placeholder="Your password" autocomplete="current-password">
                        <button type="button" class="login-pw-toggle" id="toggleSiPw" aria-label="Show/hide password">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <span class="login-forgot" id="forgotPwLink">Forgot your password?</span>
                <button class="btn btn-primary login-submit" id="btnSignIn">
                    <span class="login-btn-text">Sign In</span>
                    <span class="login-spinner">Signing in…</span>
                </button>
                <div class="login-error" id="siError"></div>
                <div class="login-success" id="siSuccess"></div>
            </div>

            <!-- Create Account Form -->
            <div class="login-form" id="formSignUp">
                <div class="login-field">
                    <label class="login-label" for="suName">Full Name</label>
                    <input type="text" id="suName" class="login-input" placeholder="e.g. Chidi Okafor" autocomplete="name">
                </div>
                <div class="login-field">
                    <label class="login-label" for="suEmail">Email Address</label>
                    <input type="email" id="suEmail" class="login-input" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="login-field">
                    <label class="login-label" for="suPassword">Password</label>
                    <div class="login-pw-wrap">
                        <input type="password" id="suPassword" class="login-input" placeholder="Min. 8 characters" autocomplete="new-password">
                        <button type="button" class="login-pw-toggle" id="toggleSuPw" aria-label="Show/hide password">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <p class="login-hint">Already subscribed via email? Create an account with the same email to access your profile.</p>
                </div>
                <button class="btn btn-primary login-submit" id="btnSignUp">
                    <span class="login-btn-text">Create Account</span>
                    <span class="login-spinner">Creating account…</span>
                </button>
                <div class="login-error" id="suError"></div>
                <div class="login-success" id="suSuccess"></div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
    (function () {
        'use strict';

        // ── Theme
        const stored = localStorage.getItem('dracohub-theme');
        if (stored) document.documentElement.setAttribute('data-theme', stored);
        document.getElementById('themeToggle').addEventListener('click', function () {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('dracohub-theme', next);
        });

        // ── Helpers
        function showTab(tab) {
            document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
            document.getElementById('tabSignUp').classList.toggle('active', tab === 'signup');
            document.getElementById('formSignIn').classList.toggle('active', tab === 'signin');
            document.getElementById('formSignUp').classList.toggle('active', tab === 'signup');
        }

        function togglePw(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.querySelector('.login-btn-text').style.display = loading ? 'none' : 'inline';
            btn.querySelector('.login-spinner').style.display = loading ? 'inline' : 'none';
        }

        function showError(elId, msg) {
            const el = document.getElementById(elId);
            el.textContent = msg; el.style.display = 'block';
        }
        function showSuccess(elId, html) {
            const el = document.getElementById(elId);
            el.innerHTML = html; el.style.display = 'block';
        }
        function clearMessages() {
            ['siError','siSuccess','suError','suSuccess'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }
        function redirectAfterLogin() {
            const next = new URLSearchParams(window.location.search).get('next');
            window.location.href = next || 'profile.html';
        }

        // ── Tab switching
        document.getElementById('tabSignIn').addEventListener('click', function () { showTab('signin'); });
        document.getElementById('tabSignUp').addEventListener('click', function () { showTab('signup'); });

        // ── Google OAuth
        document.getElementById('btnGoogle').addEventListener('click', async function () {
            if (!sb) { showError('siError', 'Auth service unavailable. Please refresh.'); return; }
            const { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + (window.location.pathname.replace('login.html', '') || '/') + 'profile.html'
                }
            });
            if (error) showError('siError', error.message);
        });

        // ── Password toggles
        document.getElementById('toggleSiPw').addEventListener('click', function () { togglePw('siPassword'); });
        document.getElementById('toggleSuPw').addEventListener('click', function () { togglePw('suPassword'); });

        // ── Supabase init
        const SUPABASE_URL = 'https://ljhbyudaiuhviagiigwb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqaGJ5dWRhaXVodmlhZ2lpZ3diIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODE4NTgsImV4cCI6MjA5MTE1Nzg1OH0.N6eQLAmrTqidXYZRej_Eqpy5G_ci6mLRZ64OW1XEHkE';

        let sb = null;
        try {
            sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error('Supabase init failed:', e);
        }

        if (sb) {
            sb.auth.getSession().then(function (res) {
                if (res.data.session) redirectAfterLogin();
            });
            sb.auth.onAuthStateChange(function (event) {
                if (event === 'PASSWORD_RECOVERY') {
                    const newPass = prompt('Enter your new password (min. 8 characters):');
                    if (newPass && newPass.length >= 8) {
                        sb.auth.updateUser({ password: newPass }).then(function (res) {
                            if (res.error) alert('Error: ' + res.error.message);
                            else { alert('Password updated! You are now signed in.'); redirectAfterLogin(); }
                        });
                    }
                }
            });
        }

        // ── Sign In
        document.getElementById('btnSignIn').addEventListener('click', async function () {
            clearMessages();
            if (!sb) { showError('siError', 'Auth service unavailable. Please refresh.'); return; }
            const email    = document.getElementById('siEmail').value.trim();
            const password = document.getElementById('siPassword').value;
            if (!email || !password) { showError('siError', 'Please enter your email and password.'); return; }
            setLoading('btnSignIn', true);
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            setLoading('btnSignIn', false);
            if (error) { showError('siError', error.message === 'Invalid login credentials' ? 'Email or password is incorrect.' : error.message); return; }
            if (data.user) await sb.rpc('claim_subscriber', { p_user_id: data.user.id }).catch(() => {});
            showSuccess('siSuccess', 'Signed in! Redirecting…');
            setTimeout(redirectAfterLogin, 800);
        });

        // ── Create Account
        document.getElementById('btnSignUp').addEventListener('click', async function () {
            clearMessages();
            if (!sb) { showError('suError', 'Auth service unavailable. Please refresh.'); return; }
            const name     = document.getElementById('suName').value.trim();
            const email    = document.getElementById('suEmail').value.trim();
            const password = document.getElementById('suPassword').value;
            if (!email || !password) { showError('suError', 'Please enter your email and a password.'); return; }
            if (password.length < 8)  { showError('suError', 'Password must be at least 8 characters.'); return; }
            setLoading('btnSignUp', true);
            const { data, error } = await sb.auth.signUp({ email, password, options: { data: { name } } });
            setLoading('btnSignUp', false);
            if (error) { showError('suError', error.message.includes('already registered') ? 'An account with this email already exists. Try signing in instead.' : error.message); return; }
            if (!data.session) { showSuccess('suSuccess', 'Almost there! Check your email and click the confirmation link, then come back to sign in.'); return; }
            if (data.user) await sb.rpc('claim_subscriber', { p_user_id: data.user.id }).catch(() => {});
            showSuccess('suSuccess', 'Account created! Redirecting to your profile…');
            setTimeout(redirectAfterLogin, 800);
        });

        // ── Forgot Password
        document.getElementById('forgotPwLink').addEventListener('click', async function () {
            clearMessages();
            if (!sb) { showError('siError', 'Auth service unavailable. Please refresh.'); return; }
            const email = document.getElementById('siEmail').value.trim();
            if (!email) { showError('siError', 'Enter your email address above first, then click "Forgot your password?"'); return; }
            const redirectTo = window.location.href.split('?')[0];
            const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
            if (error) showError('siError', error.message);
            else showSuccess('siSuccess', 'Password reset email sent — check your inbox.');
        });

        // ── Enter key
        document.addEventListener('keydown', function (e) {
            if (e.key !== 'Enter') return;
            if (document.getElementById('formSignIn').classList.contains('active')) {
                document.getElementById('btnSignIn').click();
            } else {
                document.getElementById('btnSignUp').click();
            }
        });

    }());
    </script>
</body>
</html>
